[GRAPHICS]
; Cache de spritesheets - valor moderado para evitar acúmulo de VRAM com o tempo.
spritesheetCacheSize=256
; Atlas menor reduz alocação de VRAM e pressão no garbage collector de texturas.
qsgAtlasWidth=2048
qsgAtlasHeight=2048
; Limita efeitos visuais simultâneos - principal causa de acúmulo de objetos gráficos.
maximumNumberOfEffects=120
; Atraso de mísseis.
missileFlyDelayMsec=120
; Duração menor = menos efeitos numéricos acumulados na tela simultaneamente.
numericalEffectDisplayDurationMsec=500
; Fusão de efeitos numéricos.
numericalEffectMergeDurationMsec=80
; Duração das marcas temporárias reduzida.
temporaryMarkDisplayDurationMsec=500
; Renderização threaded distribui carga entre núcleos.
renderLoopType=threaded
; Força limpeza periódica do cache de texturas do scene graph Qt.
qsgTextureCacheSize=64

[FPSHISTORY]
; Aumenta intervalo de amostragem para reduzir overhead de coleta de dados.
sampleRateMsec=120000
uploadRateSec=600

[NETWORK]
maxConcurrentDownloads=5

[MOVEMENT]
minPercentageOfCurrentMovementBeforeSendNext=1.0
maxMillisecondsToFinishCurrentMovementBeforeSendNext=0

[CHAT]
; Reduzido para evitar acúmulo de memória com mensagens antigas.
maxChatBacklogLength=200
maxChatInputHistoryLength=50